        <h1>「『世雄無等倫，百福自莊嚴，得無上智慧，願為世間說，度脫於我等、及諸眾生類，為分</h1>
        <div class="article-meta">

        </div>

      <div class="article-content">
        <p>「『世雄無等倫，百福自莊嚴，得無上智慧，願為世間說，度脫於我等、及諸眾生類，為分別顯示，令得是智慧，若我等得佛，眾生亦復然，世尊知眾生，深心之所念，亦知所行道，又知智慧力，欲樂及修福，宿命所行業，世尊悉知已，當轉無上輪。』」</p>
