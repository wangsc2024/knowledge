        <h1>「我為太子時，羅睺為長子，我今成佛道，受法為法子，於未來世中，見無量億佛，皆為其</h1>
        <div class="article-meta">

        </div>

      <div class="article-content">
        <p>「我為太子時，羅睺為長子，我今成佛道，受法為法子，於未來世中，見無量億佛，皆為其長子，一心求佛道，羅睺羅密行，唯我能知之，現為我長子，以示諸眾生，無量億千萬，功德不可數，安住於佛法，以求無上道。」</p>
