        <div class="article-meta">
          <div class="tags"><span class="tag">佛學</span><span class="tag">公案</span><span class="tag">迦葉</span><span class="tag">無門關</span><span class="tag">禪</span></div>
        </div>

      <div class="article-content">
        <p>【公案】</p>
<p>世尊昔在靈山會上，拈花示眾。是時眾皆默然，惟迦葉尊者破顏微笑。</p>
<p>世尊云：「吾有正法眼藏，涅槃妙心，實相無相，微妙法門，不立文字，教外別傳，付囑摩訶迦葉。」</p>
<p>來源：《無門關-第6則-世尊拈花》</p>
<p>集者：宋 無門慧開</p>
<p>【註】</p>
<p>此則為禪宗「以心傳心」之根本公案，為西天二十八祖傳法之始。</p>
<p>「拈花微笑」非語言授受，乃當下相契；「教外別傳，不立文字」八字遂成禪門宗旨綱領。</p>
