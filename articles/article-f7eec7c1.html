      <div class="article-content">
        <p>【公案】</p>
<p>馬大師不安，院主問：「和尚近日尊候如何？」</p>
<p>大師云：「日面佛，月面佛。」</p>
<p>來源：《碧巖錄-第3則-日面佛月面佛》</p>
<p>集者：宋 圜悟克勤</p>
<p>【註】</p>
<p>《佛名經》載：日面佛壽一千八百歲，月面佛壽僅一日一夜。馬祖示疾，以一語涵長短壽夭、生死動靜，</p>
<p>不落兩邊。後人多以此公案參「平等中現差別、差別中見平等」之旨。</p>
