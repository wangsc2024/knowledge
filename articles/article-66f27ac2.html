      <div class="article-content">
        <p>「入道慚愧人，持鉢福眾生，云何縱塵欲？沈沒於五情，已捨五欲樂，棄之而不顧，如何還欲得？如愚自食吐，諸欲求時苦，得時多怖畏，失時懷熱惱，一切無樂處，諸欲患如是，以何能捨之？，得深禪定樂，即不為所欺。」</p>
