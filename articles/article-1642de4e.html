        <h1>「當精進一心，我欲說此事，勿得有疑悔，佛智叵思議，汝今出信力，住於忍善中，昔所未</h1>
        <div class="article-meta">

        </div>

      <div class="article-content">
        <p>「當精進一心，我欲說此事，勿得有疑悔，佛智叵思議，汝今出信力，住於忍善中，昔所未聞法，今皆當得聞，我今安慰汝，勿得懷疑懼，佛無不實語，智慧不可量，所得第一法，甚深叵分別，如是今當說，汝等一心聽。」</p>
