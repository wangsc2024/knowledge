        <h1>「我今僧中說，阿難持法者，當供養諸佛，然後成正覺，號曰：山海慧自在通王佛，其國土</h1>
        <div class="article-meta">

        </div>

      <div class="article-content">
        <p>「我今僧中說，阿難持法者，當供養諸佛，然後成正覺，號曰：山海慧自在通王佛，其國土清淨，名常立勝幡，教化諸菩薩，其數如恒沙，佛有大威德，名聞滿十方，壽命無有量，以愍眾生故，正法倍壽命，像法復倍是，如恒河沙等、無數諸眾生，於此佛法中，種佛道因緣。」</p>
