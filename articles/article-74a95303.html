        <h1>「如人在岐路，疑惑無所趣，諸法實相中，疑亦復如是，疑故不勤求，諸法之實相，見疑從</h1>
        <div class="article-meta">
          <div class="tags"><span class="tag">佛學</span><span class="tag">佛經原典</span><span class="tag">偈頌</span></div>
        </div>
      </div>

      <div class="article-content">
        <p>「如人在岐路，疑惑無所趣，諸法實相中，疑亦復如是，疑故不勤求，諸法之實相，見疑從癡生，惡中之惡者，善不善法中，生死及涅槃，定實真有法，於中莫生疑，汝若懷疑惑，死王獄吏縛，如師子搏鹿，不能得解脫，在世雖有疑，當隨喜善法，譬如觀岐道，利好者應逐。」</p>
