      <div class="article-content">
        <p>佛教「八苦」是人生在輪迴中必然經歷的八種根本痛苦，包括生、老、病、死（生理之苦）與愛別離、怨憎會、求不得（心理之苦），以及五蘊熾盛（身心聚合的根本之苦），這八種苦是佛陀揭示人生真相的核心教義，旨在引導眾生離苦得樂、解脫生死。 123</p>
