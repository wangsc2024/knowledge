      <div class="article-content">
        <p>【公案】</p>
<p>趙州和尚因僧問：「狗子還有佛性也無？」</p>
<p>州云：「無。」</p>
<p>來源：《無門關-第1則-趙州狗子》</p>
<p>集者：宋 無門慧開</p>
<p>【註】</p>
<p>此則世稱「趙州無字」公案，為宋以後看話禪首要話頭。無門慧開頌云：「狗子佛性，全提正令；</p>
<p>纔涉有無，喪身失命。」一個「無」字非是有無對待之無，乃截斷凡聖之路、直契本來面目之消息。</p>
