      <div class="article-content">
        <p>「『世尊甚希有，難可得值遇，具無量功德，能救護一切，天人之大師，哀愍於世間，十方諸眾生，普皆蒙饒益，我等所從來，五百萬億國，捨深禪定樂，為供養佛故，我等先世福，宮殿甚嚴飾，今以奉世尊，唯願哀納受。』</p>
