        <h1>「無上兩足尊，願說第一法，我為佛長子，唯垂分別說，是會無量眾，能敬信此法，佛已曾</h1>
        <div class="article-meta">

        </div>

      <div class="article-content">
        <p>「無上兩足尊，願說第一法，我為佛長子，唯垂分別說，是會無量眾，能敬信此法，佛已曾世世，教化如是等，皆一心合掌，欲聽受佛語，我等千二百，及餘求佛者，願為此眾故，唯垂分別說，是等聞此法，則生大歡喜。」</p>
