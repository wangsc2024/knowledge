        <h1>「汝起勿抱臭屍臥，種種不淨假名人，如得重病箭入體。諸苦痛集安可眠？，如人被縛將去</h1>
        <div class="article-meta">

        </div>
      </div>

      <div class="article-content">
        <p>「汝起勿抱臭屍臥，種種不淨假名人，如得重病箭入體。諸苦痛集安可眠？，如人被縛將去殺，災害垂至安可眠？，結賊不滅害未除，如共毒蛇同室居，亦如臨陣兩刃間。爾時云何安可眠？，眠為大闇無所見，日日欺誑奪人明，以眠覆心無所見，如是大失安可眠？」</p>
