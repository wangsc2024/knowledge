        <h1>「閑坐林樹間，寂然滅諸惡，憺怕得一心，斯樂非天樂，人求世間利，名衣好床褥，斯樂非</h1>

      <div class="article-content">
        <p>「閑坐林樹間，寂然滅諸惡，憺怕得一心，斯樂非天樂，人求世間利，名衣好床褥，斯樂非安隱，求利無厭足，衲衣在空閑，動止心常一，自以智慧明，觀諸法實相，種種諸法中，皆以等觀入，解慧心寂然，三界無倫匹。」</p>
