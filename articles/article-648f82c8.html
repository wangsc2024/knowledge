        <h1>「不見一法存無見，大似浮雲遮日面，不知一法守空知，還如太虛生閃電，此之知見瞥然興</h1>
        <div class="article-meta">

        </div>

      <div class="article-content">
        <p>「不見一法存無見，大似浮雲遮日面，不知一法守空知，還如太虛生閃電，此之知見瞥然興，錯認何曾解方便，汝當一念自知非，自己靈光常顯現。」</p>
