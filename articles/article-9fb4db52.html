      <div class="article-content">
        <p>「是二千聲聞，今於我前住，悉皆與授記，未來當成佛，所供養諸佛，如上說塵數，護持其法藏，後當成正覺，各於十方國，悉同一名號，俱時坐道場，以證無上慧，皆名為寶相。國土及弟子，正法與像法，悉等無有異，咸以諸神通，度十方眾生，名聞普周遍，漸入於涅槃。」</p>
